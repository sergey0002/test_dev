services:
  influxdb:
    image: influxdb:1.8-alpine
    container_name: notification-loadtest-influxdb
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    ports:
      - "${LOADTEST_INFLUXDB_PORT:-8086}:8086"
    networks:
      - notification-network

  grafana:
    image: grafana/grafana:10.4.14
    container_name: notification-loadtest-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "${LOADTEST_GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - influxdb
    networks:
      - notification-network

  k6:
    image: grafana/k6:0.49.0
    container_name: notification-loadtest-k6
    volumes:
      - ./k6:/scripts
    environment:
      BASE_URL: ${LOADTEST_BASE_URL:-http://nginx}
      K6_OUT: ${K6_OUT:-influxdb=http://influxdb:8086/k6}
      START_RECIPIENT_ID: ${START_RECIPIENT_ID:-11}
      MAX_RECIPIENT_ID: ${MAX_RECIPIENT_ID:-110}
    depends_on:
      - influxdb
    networks:
      - notification-network

networks:
  notification-network:
    external: true
    name: ${LOADTEST_DOCKER_NETWORK:-test_notification-network}
