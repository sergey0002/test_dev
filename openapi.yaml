openapi: 3.0.3
info:
  title: Notification Service API
  version: 1.0.0
  description: |
    API микросервиса уведомлений для тестового задания.
servers:
  - url: http://localhost:18080
    description: Local Docker environment
tags:
  - name: Health
  - name: Notifications
  - name: Read API
paths:
  /health:
    get:
      tags: [Health]
      summary: Health-check сервиса и зависимостей
      responses:
        "200":
          description: Сервис и зависимости доступны
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                checks:
                  database: ok
                  redis: ok
                  rabbitmq: ok
        "503":
          description: Сервис деградирован (одна из зависимостей недоступна)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: degraded
                checks:
                  database: ok
                  redis: failed
                  rabbitmq: ok
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health-check (версия v1)
      responses:
        "200":
          description: Сервис и зависимости доступны
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Сервис деградирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/notifications/bulk:
    post:
      tags: [Notifications]
      summary: Создать batch уведомлений
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBatchRequest"
            example:
              channel: email
              type: transactional
              message: Ваш код доступа: 1234
              recipient_ids: [1, 2, 3]
              idempotency_key: auth-codes-001
              metadata:
                source_service: auth
      responses:
        "202":
          description: Batch принят в обработку
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBatchResponse"
              example:
                data:
                  batch_id: 1
                  status: accepted
                  channel: email
                  type: transactional
                  requested_count: 3
                  accepted_count: 3
                  created_at: "2026-05-22T10:00:00Z"
        "409":
          description: Конфликт идемпотентности (тот же ключ, другой payload)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Этот idempotency_key уже использован с другим payload.
        "422":
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
              example:
                message: The recipient ids field is required.
                errors:
                  recipient_ids:
                    - The recipient ids field is required.
        "429":
          description: Превышен лимит запросов (throttle middleware)
          headers:
            Retry-After:
              schema:
                type: integer
            X-RateLimit-Limit:
              schema:
                type: integer
            X-RateLimit-Remaining:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Too Many Attempts.
  /api/v1/batches/{batch}:
    get:
      tags: [Read API]
      summary: Получить summary по batch
      parameters:
        - in: path
          name: batch
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Сводка по batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchSummaryResponse"
              example:
                data:
                  batch_id: 1
                  requested_count: 3
                  accepted_count: 3
                  queued_count: 1
                  sent_count: 0
                  delivered_count: 2
                  dropped_count: 0
        "404":
          description: Batch не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /api/v1/subscribers/{subscriber}/notifications:
    get:
      tags: [Read API]
      summary: История уведомлений подписчика
      parameters:
        - in: path
          name: subscriber
          required: true
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Количество элементов на страницу (по умолчанию 20)
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: channel
          schema:
            type: string
            enum: [email, sms]
        - in: query
          name: status
          schema:
            type: string
            enum: [queued, sent, delivered, dropped]
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Пагинированная история уведомлений
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberNotificationsResponse"
        "404":
          description: Подписчик не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
components:
  schemas:
    CreateBatchRequest:
      type: object
      required:
        - channel
        - type
        - message
        - recipient_ids
        - idempotency_key
      properties:
        channel:
          type: string
          enum: [email, sms]
        type:
          type: string
          enum: [transactional, marketing]
        message:
          type: string
          minLength: 1
          maxLength: 1000
        recipient_ids:
          type: array
          minItems: 1
          maxItems: 10000
          items:
            type: integer
        idempotency_key:
          type: string
          maxLength: 128
        metadata:
          type: object
          additionalProperties: true
    CreateBatchData:
      type: object
      properties:
        batch_id:
          type: integer
        status:
          type: string
        channel:
          type: string
          enum: [email, sms]
        type:
          type: string
          enum: [transactional, marketing]
        requested_count:
          type: integer
        accepted_count:
          type: integer
        created_at:
          type: string
          format: date-time
    CreateBatchResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/CreateBatchData"
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        checks:
          type: object
          properties:
            database:
              type: string
              enum: [ok, failed]
            redis:
              type: string
              enum: [ok, failed]
            rabbitmq:
              type: string
              enum: [ok, failed]
    BatchSummaryData:
      type: object
      properties:
        batch_id:
          type: integer
        requested_count:
          type: integer
        accepted_count:
          type: integer
        queued_count:
          type: integer
        sent_count:
          type: integer
        delivered_count:
          type: integer
        dropped_count:
          type: integer
    BatchSummaryResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/BatchSummaryData"
    NotificationEvent:
      type: object
      properties:
        id:
          type: integer
        from_status:
          type: string
          nullable: true
          enum: [queued, sent, delivered, dropped]
        to_status:
          type: string
          enum: [queued, sent, delivered, dropped]
        reason:
          type: string
        meta:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          nullable: true
    NotificationItem:
      type: object
      properties:
        id:
          type: integer
        batch_id:
          type: integer
        subscriber_id:
          type: integer
        channel:
          type: string
          enum: [email, sms]
        type:
          type: string
          enum: [transactional, marketing]
        message:
          type: string
        status:
          type: string
          enum: [queued, sent, delivered, dropped]
        attempts_count:
          type: integer
        queued_at:
          type: string
          format: date-time
          nullable: true
        sent_at:
          type: string
          format: date-time
          nullable: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
        dropped_at:
          type: string
          format: date-time
          nullable: true
        events:
          type: array
          items:
            $ref: "#/components/schemas/NotificationEvent"
    PaginationLink:
      type: object
      properties:
        url:
          type: string
          nullable: true
        label:
          type: string
        active:
          type: boolean
    SubscriberNotificationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NotificationItem"
        links:
          type: object
          properties:
            first:
              type: string
              nullable: true
            last:
              type: string
              nullable: true
            prev:
              type: string
              nullable: true
            next:
              type: string
              nullable: true
        meta:
          type: object
          properties:
            current_page:
              type: integer
            from:
              type: integer
              nullable: true
            last_page:
              type: integer
            path:
              type: string
            per_page:
              type: integer
            to:
              type: integer
              nullable: true
            total:
              type: integer
            links:
              type: array
              items:
                $ref: "#/components/schemas/PaginationLink"
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
