services:
  nginx:
    image: nginx:1.27-alpine
    container_name: notification-nginx
    ports:
      - "${APP_PORT:-18080}:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - notification-network

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: notification-app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - notification-network

  postgres:
    image: postgres:16-alpine
    container_name: notification-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notification_service}
      POSTGRES_USER: ${POSTGRES_USER:-notification}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notification}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notification} -d ${POSTGRES_DB:-notification_service}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - notification-network

  redis:
    image: redis:7-alpine
    container_name: notification-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - notification-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: notification-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - notification-network

  worker-high:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: notification-worker-high
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    command: sh -lc "if [ -f artisan ] && php artisan list --raw | grep -q '^notifications:consume'; then php artisan notifications:consume --queue=high; else echo 'notifications:consume is not implemented yet. Worker is idle.' && tail -f /dev/null; fi"
    depends_on:
      app:
        condition: service_started
    networks:
      - notification-network

  worker-normal:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: notification-worker-normal
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    command: sh -lc "if [ -f artisan ] && php artisan list --raw | grep -q '^notifications:consume'; then php artisan notifications:consume --queue=normal; else echo 'notifications:consume is not implemented yet. Worker is idle.' && tail -f /dev/null; fi"
    depends_on:
      app:
        condition: service_started
    networks:
      - notification-network

  outbox-publisher:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: notification-outbox-publisher
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    command: sh -lc "if [ -f artisan ] && php artisan list --raw | grep -q '^notifications:publish-outbox'; then php artisan notifications:publish-outbox --loop; else echo 'notifications:publish-outbox is not implemented yet. Publisher is idle.' && tail -f /dev/null; fi"
    depends_on:
      app:
        condition: service_started
    networks:
      - notification-network

volumes:
  postgres-data:
  rabbitmq-data:

networks:
  notification-network:
    driver: bridge
